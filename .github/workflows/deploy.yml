name: CI/CD BlackCloud - Laravel ntsistemasw

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do Código
        uses: actions/checkout@v4

      - name: 2. Configurar Docker Buildx (Cache de Build)
        uses: docker/setup-buildx-action@v3

      - name: 3. Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 4. Build e Push da Imagem (Incluso Drivers PHP)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Nome da imagem no seu Docker Hub
          tags: ntsistemasw/twn-backoffice:latest
          # Usa cache do GitHub para builds subsequentes serem rápidos
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-vps:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: 1. Atualizar Imagem no Docker Swarm (VPS 1)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Força o Swarm a baixar a imagem nova do seu Docker Hub
            # 'twn_app' deve ser o nome do serviço na sua Stack do Portainer
            docker service update --image ntsistemasw/twn-backoffice:latest --with-registry-auth twn_app

      - name: 2. Executar Database Migrations
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Aguarda 15 segundos para o container subir com os novos drivers
            sleep 15
            # Roda as migrations dentro do container que o Swarm acabou de criar
            docker exec $(docker ps -q -f name=twn_app) php artisan migrate --force

      - name: 3. Limpeza de Caches do Laravel
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker exec $(docker ps -q -f name=twn_app) php artisan config:cache
            docker exec $(docker ps -q -f name=twn_app) php artisan route:cache
            docker exec $(docker ps -q -f name=twn_app) php artisan view:cache
