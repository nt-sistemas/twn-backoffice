name: CI/CD BlackCloud - Laravel Filament

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do Código
        uses: actions/checkout@v4

      - name: 2. Configurar Docker Buildx (Cache Inteligente)
        uses: docker/setup-buildx-action@v3

      - name: 3. Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 4. Build e Push da Imagem (Dockerfile)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/twn-backoffice:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-vps:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: 1. Conectar via SSH e Atualizar Código Estático (Assets)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Entra na pasta para o Nginx ler os arquivos estáticos (CSS/JS/Imagens)
            cd /var/www/html/${{ github.event.repository.name }}
            git pull origin main

      - name: 2. Atualizar Stack no Docker Swarm
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Força o Swarm a baixar a imagem nova e atualizar os serviços
            docker stack deploy --with-registry-auth -c infra/prod.yml twn-backoffice

      - name: 3. Executar Database Migrations
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Aguarda o container subir com os drivers novos
            sleep 20
            # Roda as migrations dentro do novo container 'app'
            docker exec $(docker ps -q -f name=twn-backoffice_app) php artisan migrate --force

      - name: 4. Limpeza de Caches e Otimização
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker exec $(docker ps -q -f name=twn-backoffice_app) php artisan config:cache
            docker exec $(docker ps -q -f name=twn-backoffice_app) php artisan route:cache
            docker exec $(docker ps -q -f name=twn-backoffice_app) php artisan view:cache
