name: CI/CD BlackCloud - Laravel ntsistemasw

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do Código
        uses: actions/checkout@v4

      - name: 2. Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 3. Build e Push da Imagem (Totalmente Nova)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ntsistemasw/twn-backoffice:latest
          no-cache: true # GARANTE QUE O COMPOSER RODE DO ZERO

  deploy-vps:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: 1. Atualizar Serviço no Docker Swarm
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Força o Swarm a baixar a imagem recém-criada
            docker pull ntsistemasw/twn-backoffice:latest
            docker service update --image ntsistemasw/twn-backoffice:latest --with-registry-auth twn_app

      - name: 2. Comandos de Pós-Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sleep 30
            # Agora os comandos rodam no caminho /var/www/html
            docker exec $(docker ps -q -f name=twn_app) php /var/www/html/artisan migrate --force
            docker exec $(docker ps -q -f name=twn_app) php /var/www/html/artisan optimize:clear
